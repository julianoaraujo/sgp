{% extends 'base.html' %}

{% block title %}{% if carteira %}Editar{% else %}Nova{% endif %} Carteira - SGP{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-8 offset-md-2">
        <div class="card">
            <div class="card-header">
                <h4 class="mb-0">
                    <i class="bi bi-briefcase-fill"></i> 
                    {% if carteira %}Editar Carteira{% else %}Nova Carteira{% endif %}
                </h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}

                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="ano" class="form-label">Ano *</label>
                                <input type="number" class="form-control" id="ano" name="ano" 
                                       value="{{ carteira.ano|default:'' }}" min="2020" max="2050" required>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="periodo" class="form-label">Período *</label>
                                <input type="text" class="form-control" id="periodo" name="periodo" 
                                       value="{{ carteira.periodo|default:'' }}" 
                                       placeholder="Ex: 1º Semestre, Trimestre 1" required>
                            </div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="titulo" class="form-label">Título *</label>
                        <input type="text" class="form-control" id="titulo" name="titulo" 
                               value="{{ carteira.titulo|default:'' }}" required>
                    </div>

                    <div class="mb-3">
                        <label for="descricao" class="form-label">Descrição *</label>
                        <textarea class="form-control" id="descricao" name="descricao" 
                                  rows="4" required>{{ carteira.descricao|default:'' }}</textarea>
                    </div>

                    <div class="mb-3">
                        <label for="orcamento_total" class="form-label">Orçamento Total</label>
                        <div class="input-group">
                            <span class="input-group-text">R$</span>
                            <input type="number" class="form-control" id="orcamento_total" 
                                   name="orcamento_total" step="0.01" min="0"
                                   value="{{ carteira.orcamento_total|default:'' }}">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="observacoes" class="form-label">Observações</label>
                        <textarea class="form-control" id="observacoes" name="observacoes" 
                                  rows="3">{{ carteira.observacoes|default:'' }}</textarea>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="{% url 'carteira_list' %}" class="btn btn-secondary">
                            <i class="bi bi-arrow-left"></i> Cancelar
                        </a>
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-save"></i> Salvar
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
